name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup
        run: |
          sudo apt-get purge -y azure-cli* docker* ghc* dotnet* google* mono-stack* mysql* php*
          sudo apt-get autoremove -y
          sudo apt-get autoclean -y

      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf image_tools lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Sources
        run: |
          mkdir work && cd work
          git config --global user.name "Angel"
          git config --global user.email "angel@example.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync

      - name: Clone Device Tree
        run: |
          cd work
          mkdir -p device/motorola/bogota
          git clone https://github.com/TheT4ycan/TWRP_motorola_bogota device/motorola/bogota

      - name: Build TWRP
        run: |
          cd work
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_bogota-eng || true
          mka vendorbootimage -j$(nproc --all)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-MotoG56-Bogota
          path: work/out/target/product/bogota/*.img
          
